server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version from headers and error pages
    server_tokens off;

    # Security headers (shared)
    include /etc/nginx/conf.d/security-headers.conf;

    # Prevent direct access to hidden files (e.g. .env, .git)
    location ~ /\. {
        deny all;
    }

    # Disable caching for the runtime config file so restarts pick up env changes
    location = /config.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # /storybook/ → storybook-static build (fully pre-rendered, no SPA fallback)
    location /storybook/ {
        alias /usr/share/nginx/html/storybook/;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # /petstore/ → React SPA with index.html fallback for client-side routing
    location /petstore/ {
        alias /usr/share/nginx/html/petstore/;
        index index.html;
        try_files $uri $uri/ /petstore/index.html;
    }

    # Cache long-lived static assets (hashed filenames)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # API reverse proxy — location block generated by entrypoint.sh at container startup.
    # /api/v1/<path> is proxied to the backend defined by API_BASE_URL env var.
    # This avoids CORS: the browser makes same-origin requests to /api/v1/ and
    # nginx forwards them to the actual (cross-origin) API server.
    include /tmp/api-proxy-location.conf;

    # Root → public/ homepage (fallback to index.html for unknown paths)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
