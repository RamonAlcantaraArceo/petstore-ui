<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Petstore UI | Petstore Demo</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: Inter, system-ui, -apple-system, sans-serif; }
      #root { min-height: 100vh; }
    </style>
    <link rel="icon" type="image/x-icon" href="petstore.ico" />
    <!--
      Load runtime config before the app bundle so window.__RUNTIME_CONFIG__
      is populated when apiClient.resolveBaseUrl() runs.
      onerror silently ignores a 404 in local dev. Without config.js,
      apiClient requires a meta tag fallback:
      <meta name="api-base-url" content="..." />
      bun run preview serves /config.js dynamically from environment variables.
    -->
    <script src="/config.js" onerror="/* config.js absent in dev */"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="dist/index.js"></script>
  </body>
</html>
