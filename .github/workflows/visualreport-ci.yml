name: Visual Report Publish

on:

  push:
    branches: [reporter-to-s3]

  workflow_dispatch:
    inputs:
      target_env:
        description: Target environment prefix
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod
      update_baseline:
        description: Run visual tests in baseline mode (--update-snapshots)
        required: true
        default: false
        type: boolean

jobs:
  publish-visual-report:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.OIDC_ROLE_NAME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up environment variables
        run: |
          echo "AWS_REGION=${{ vars.AWS_REGION }}" >> $GITHUB_ENV
          echo "S3_VISUAL_REPORTS_BUCKET=${{ vars.S3_VISUAL_REPORTS_BUCKET }}" >> $GITHUB_ENV
          echo "TARGET_ENV=${{ github.event.inputs.target_env || 'dev' }}" >> $GITHUB_ENV
          echo "VISUAL_REPORT_BASE_PATH=${{ github.event.inputs.target_env || 'dev' }}/visual-report" >> $GITHUB_ENV
          echo "BASELINE_S3_BASE_PATH=${{ github.event.inputs.target_env || 'dev' }}/visual-baseline/storybook.visual.spec.ts-snapshots" >> $GITHUB_ENV

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run visual tests (baseline mode)
        id: baseline_tests
        continue-on-error: true
        if: ${{ inputs.update_baseline }}
        run: bun run build-storybook && bun run test:visual:update

      - name: Publish Playwright baseline snapshots to immutable SHA path
        continue-on-error: true
        if: ${{ inputs.update_baseline }}
        run: |
          aws s3 sync tests/visual/storybook.visual.spec.ts-snapshots/ "s3://${S3_VISUAL_REPORTS_BUCKET}/${BASELINE_S3_BASE_PATH}/${GITHUB_SHA}/" --delete --no-cli-pager

      - name: Publish Playwright baseline snapshots to latest path
        continue-on-error: true
        if: ${{ inputs.update_baseline }}
        run: |
          aws s3 sync tests/visual/storybook.visual.spec.ts-snapshots/ "s3://${S3_VISUAL_REPORTS_BUCKET}/${BASELINE_S3_BASE_PATH}/latest/" --delete --no-cli-pager

      - name: Download Playwright baseline snapshots from S3 latest
        if: ${{ !inputs.update_baseline }}
        run: |
          if ! aws s3 ls "s3://${S3_VISUAL_REPORTS_BUCKET}/${BASELINE_S3_BASE_PATH}/latest/" --no-cli-pager >/dev/null 2>&1; then
            echo "::error::No baseline snapshots found at s3://${S3_VISUAL_REPORTS_BUCKET}/${BASELINE_S3_BASE_PATH}/latest/. Run baseline mode first (update_baseline=true)."
            exit 1
          fi
          mkdir -p tests/visual/storybook.visual.spec.ts-snapshots/
          aws s3 sync "s3://${S3_VISUAL_REPORTS_BUCKET}/${BASELINE_S3_BASE_PATH}/latest/" tests/visual/storybook.visual.spec.ts-snapshots/ --delete --no-cli-pager

      - name: Run visual tests (compare mode)
        continue-on-error: true
        if: ${{ !inputs.update_baseline }}
        run: bun run build-storybook && bun run test:visual

      - name: Build visual report assets
        run: bun run report:visual:build

      - name: Publish visual report to immutable SHA path
        run: |
          aws s3 sync public/visual-report "s3://${S3_VISUAL_REPORTS_BUCKET}/${VISUAL_REPORT_BASE_PATH}/${GITHUB_SHA}/" --delete --no-cli-pager

      - name: Publish visual report to latest path
        run: |
          aws s3 sync public/visual-report "s3://${S3_VISUAL_REPORTS_BUCKET}/${VISUAL_REPORT_BASE_PATH}/latest/" --delete --no-cli-pager

      - name: Emit report URLs
        run: |
          IMMUTABLE_URL="https://${S3_VISUAL_REPORTS_BUCKET}.s3.${AWS_REGION}.amazonaws.com/${VISUAL_REPORT_BASE_PATH}/${GITHUB_SHA}/index.html"
          LATEST_URL="https://${S3_VISUAL_REPORTS_BUCKET}.s3.${AWS_REGION}.amazonaws.com/${VISUAL_REPORT_BASE_PATH}/latest/index.html"
          BASELINE_IMMUTABLE_URL="s3://${S3_VISUAL_REPORTS_BUCKET}/${BASELINE_S3_BASE_PATH}/${GITHUB_SHA}/"
          BASELINE_LATEST_URL="s3://${S3_VISUAL_REPORTS_BUCKET}/${BASELINE_S3_BASE_PATH}/latest/"
          echo "Immutable report URL: ${IMMUTABLE_URL}"
          echo "Latest report URL: ${LATEST_URL}"
          {
            echo "## Visual Report Published"
            echo "- Environment: ${TARGET_ENV}"
            echo "- Baseline mode: ${{ inputs.update_baseline }}"
            echo "- Immutable: ${IMMUTABLE_URL}"
            echo "- Latest: ${LATEST_URL}"
            echo "- Baseline immutable snapshot path: ${BASELINE_IMMUTABLE_URL}"
            echo "- Baseline latest snapshot path: ${BASELINE_LATEST_URL}"
          } >> "$GITHUB_STEP_SUMMARY"