name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main, feat/test_automation]

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run type-check

      - name: Test
        run: bun run test:ci

      - name: Upload JUnit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-report
          path: junit.xml
          if-no-files-found: warn

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit.xml
          flags: vitest-tests
          name: codecov-tests-vitest
          report_type: test_results
          verbose: true
          fail_ci_if_error: false

      - name: Build Storybook
        run: bun run build-storybook

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Visual regression tests
        run: bun run test:visual

      - name: Emit bundle stats (Vite + Codecov plugin)
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          CODECOV_DRY_RUN: "false"
        run: bun run build:bundle-stats

      - name: Upload bundle stats to Codecov
        if: ${{ hashFiles('dist/codecov/*-stats.json') != '' }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./dist/codecov/*-stats.json
          flags: bundle-analysis
          name: codecov-bundle-analysis
          fail_ci_if_error: false

      - name: Docker build validation
        timeout-minutes: 15
        env:
          DOCKER_BUILDKIT: "1"
          BUILDKIT_PROGRESS: plain
        run: |
          docker build \
            --target builder \
            --build-arg CI=true \
            --build-arg STORYBOOK_DISABLE_TELEMETRY=1 \
            --build-arg DO_NOT_TRACK=1 \
            -t petstore-ui:ci \
            .
