services:
  petstore-ui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      # Runtime API target — overridable without rebuilding the image.
      # Set in a .env file: API_BASE_URL=https://your-api-url.com/api/v1
      API_BASE_URL: "${VITE_API_BASE_URL:-}"
      # Optional API key — injected server-side by nginx (never sent to the browser).
      # Set in a .env file: API_KEY=your-key
      API_KEY: "${API_KEY:-}"
