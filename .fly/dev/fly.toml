app = "petstore-ui-dev"
primary_region = "iad"

[build]
image = "ghcr.io/ramonalcantaraarceo/petstore-ui:latest"

[deploy]
strategy = "immediate"

[env]
APP_ENV = "dev"
LOG_LEVEL = "INFO"
STORAGE_MODE = "memory"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 8_000
min_machines_running = 0
processes = [ "app" ]

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
memory_mb = 256
