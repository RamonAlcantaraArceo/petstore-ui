app = "petstore-ui-dev"
primary_region = "iad"

[build]
image = "ghcr.io/ramonalcantaraarceo/petstore-ui:latest"

[deploy]
strategy = "immediate"

[env]
APP_ENV      = "dev"
LOG_LEVEL    = "INFO"
STORAGE_MODE = "memory"
API_BASE_URL = "https://petstore-api-dev.ramon-alcantara.work/api/v1"

[http_service]
auto_start_machines = true
auto_stop_machines  = true
force_https         = true
internal_port       = 80
min_machines_running = 0
processes           = ["app"]

[http_service.concurrency]
type       = "requests"
soft_limit = 200
hard_limit = 250

[[http_service.checks]]
grace_period  = "5s"
interval      = "15s"
method        = "GET"
path          = "/"
protocol      = "http"
timeout       = "5s"

[[vm]]
cpu_kind = "shared"
cpus     = 1
memory   = "1gb"
memory_mb = 256
